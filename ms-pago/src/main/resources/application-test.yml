server:
  port: 8092

spring:
  application:
    name: ms-pago

  datasource:
    url: jdbc:mysql://localhost:3306/db_pago_test?createDatabaseIfNotExist=true
    username: root
    password: root
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false 
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect