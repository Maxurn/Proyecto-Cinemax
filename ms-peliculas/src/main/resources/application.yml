  server:
    port: 8081
  
  spring:
    application:
      name: ms-peliculas

    datasource:
      url: jdbc:mysql://localhost:3306/db_peliculas?createDatabaseIfNotExist=true
      username: root
      password: root
    
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.MySQLDialect
        
    flyway:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/

  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true
      path: /doc/swagger-ui.html