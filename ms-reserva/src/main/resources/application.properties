spring.application.name=ms-reserva
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/db_reserva?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

ms-usuario.url=http://localhost:8084
ms-cartelera.url= http://localhost:8083
ms-butacas.url= http://localhost:8085
ms-pago.url=http://localhost:8087
